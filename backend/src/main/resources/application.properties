spring.application.name=backend

# Database Connection (Flexible for Local and Railway)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/taskdb}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:your_local_password}

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Critical for Railway Port Binding
server.port=${PORT:8080}

# JWT Settings (Ensure these match your Security constants)
taskmanager.app.jwtSecret=${JWT_SECRET:yourSecretKeyForLocalTesting}
taskmanager.app.jwtExpirationMs=86400000